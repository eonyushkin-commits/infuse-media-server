services:
  webdav:
    image: ionelmc/webdav
    container_name: webdav-infuse
    restart: unless-stopped
    ports:
      - "${WEBDAV_PORT}:8080"
    volumes:
      - ./strm_library:/media
    environment:
      - WEBDAV_USERNAME=${WEBDAV_USER}
      - WEBDAV_PASSWORD=${WEBDAV_PASSWORD}
      - UID=0

  torrserver:
    image: ghcr.io/yourok/torrserver:latest
    container_name: torrserver
    restart: unless-stopped
    ports:
      - "${TORR_PORT}:8090"
    volumes:
      - ./ts:/opt/ts
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8090/echo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  parser:
    build: .
    container_name: strm-parser
    restart: unless-stopped
    depends_on:
      torrserver:
        condition: service_healthy
    volumes:
      - ./torr_to_strm.py:/app/torr_to_strm.py:ro
      - ./strm_library:/app/strm_library
    environment:
      - HOST_IP=${HOST_IP}
      - TORR_PORT=${TORR_PORT}
      - TORR_INTERNAL_PORT=8090